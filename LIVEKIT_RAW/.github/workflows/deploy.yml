name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install Python linting tools
        run: |
          pip install ruff flake8

      - name: Lint Python code
        run: |
          cd agent
          ruff check . --ignore E501 || true
          flake8 . --max-line-length=120 --exclude=venv,__pycache__ || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci || npm install
          cd ../dashboard && npm ci || npm install
          cd ../dev-dashboard && npm ci || npm install

      - name: Lint frontend
        run: cd frontend && npm run lint || true

      - name: Lint dashboard
        run: cd dashboard && npm run lint

      - name: Lint dev-dashboard
        run: cd dev-dashboard && npm run lint

      - name: TypeScript check - dashboard
        run: cd dashboard && npx tsc --noEmit

      - name: TypeScript check - dev-dashboard
        run: cd dev-dashboard && npx tsc --noEmit

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend && npm ci || npm install
          cd ../dashboard && npm ci || npm install
          cd ../dev-dashboard && npm ci || npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build dashboard
        run: cd dashboard && npm run build

      - name: Build dev-dashboard
        run: cd dev-dashboard && npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Upload dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 1

      - name: Upload dev-dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-dashboard-dist
          path: dev-dashboard/dist/
          retention-days: 1

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            
            echo "=== Starting deployment ==="
            cd /home/ubuntu/LIVEKIT
            
            echo "=== Pulling latest code ==="
            git fetch origin
            git reset --hard origin/main
            
            echo "=== Installing Python dependencies ==="
            cd agent
            source venv/bin/activate || python3 -m venv venv && source venv/bin/activate
            pip install -r requirements.txt
            
            echo "=== Building frontend ==="
            cd ../frontend
            npm ci || npm install
            npm run build
            
            echo "=== Building dashboard ==="
            cd ../dashboard
            npm ci || npm install
            npm run build
            
            echo "=== Building dev-dashboard ==="
            cd ../dev-dashboard
            npm ci || npm install
            npm run build
            
            echo "=== Restarting services ==="
            sudo systemctl restart livekit-server
            sudo systemctl restart livekit-agent
            sudo systemctl restart nginx
            
            echo "=== Deployment completed ==="
          ENDSSH

      - name: Wait for services
        run: sleep 10

      - name: Health check - Main site
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://livekit.alvarezconsult.com/ || echo "000")
          if [ "$response" != "200" ] && [ "$response" != "304" ]; then
            echo "::warning::Main site returned HTTP $response"
          else
            echo "✅ Main site healthy (HTTP $response)"
          fi

      - name: Health check - API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://livekit.alvarezconsult.com/api/health || curl -s -o /dev/null -w "%{http_code}" https://livekit.alvarezconsult.com/ || echo "000")
          if [ "$response" != "200" ] && [ "$response" != "404" ]; then
            echo "::warning::API returned HTTP $response"
          else
            echo "✅ API endpoint checked (HTTP $response)"
          fi

      - name: Health check - Dashboard
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://livekit.alvarezconsult.com/dashboard/ || echo "000")
          if [ "$response" != "200" ] && [ "$response" != "304" ]; then
            echo "::warning::Dashboard returned HTTP $response"
          else
            echo "✅ Dashboard healthy (HTTP $response)"
          fi

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

  notify:
    needs: [lint, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "status=✅ Deployment successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" == "skipped" ]; then
            echo "status=⏭️ Deployment skipped (not main branch)" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "status=❌ Deployment failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          else
            echo "status=🔄 Build/Lint status: ${{ needs.lint.result }} / ${{ needs.build.result }}" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.status.outputs.status }}**" >> $GITHUB_STEP_SUMMARY
